services:
  - type: web
    name: auth-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      # ── Set these in the Render dashboard ──────────────────────
      - key: DB_Host
        sync: false
      - key: DB_User
        sync: false
      - key: DB_Password
        sync: false
      - key: DB_Name
        sync: false
      - key: Sender_Email
        sync: false
      - key: App_Password
        sync: false
