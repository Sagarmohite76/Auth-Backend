databases:
  - name: auth-db
    databaseName: performance
    user: auth_user
    plan: free

services:
  - type: web
    name: auth-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: auth-db
          property: connectionString
      - key: Sender_Email
        sync: false          # set manually in the Render dashboard
      - key: App_Password
        sync: false          # set manually in the Render dashboard
