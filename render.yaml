services:
  - type: web
    name: auth-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      # DATABASE_URL is auto-injected by Render when a Postgres DB is linked
      # in the dashboard — no need to set it manually.
      - key: Sender_Email
        sync: false
      - key: App_Password
        sync: false
